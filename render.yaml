services:
  - type: web
    name: skillswap
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: ENABLE_DEV_ENDPOINTS
        value: "false"
      - key: RECAPTCHA_ENABLED
        value: "true"
      - key: RECAPTCHA_USE_GOOGLE_TEST_KEYS
        value: "false"
      - key: RECAPTCHA_FAIL_OPEN_ON_LOCALHOST
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USE_TLS
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_PRIMARY
        value: llama-3.1-8b-instant
      - key: GROQ_MODEL_FALLBACKS
        value: llama-3.3-70b-versatile,meta-llama/llama-4-scout-17b-16e-instruct
