{% extends 'user/base.html' %}
{% block content %}
<section class="panel small">
    <h2>Login</h2>
    {% if blocked_notice %}
        <div class="auth-inline-alert" role="alert" aria-live="polite">
            <span class="auth-inline-alert-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 3 2 21h20L12 3z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"></path>
                    <path d="M12 9v6" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
                    <circle cx="12" cy="18" r="1.2" fill="currentColor"></circle>
                </svg>
            </span>
            <span>{{ blocked_notice }}</span>
        </div>
    {% endif %}
    <form method="post" class="form-grid">
        <label>Email or Username
            <input type="text" name="email_or_username" required>
        </label>
        <label>Password
            <div class="password-field">
                <input type="password" id="loginPassword" name="password" required>
                <button type="button" class="password-toggle" data-target="loginPassword" aria-label="Show password" aria-pressed="false">
                    <svg class="password-icon-show" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                    </svg>
                    <svg class="password-icon-hide" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M3 3l18 18M10.6 10.7a3 3 0 004.2 4.2M9.9 5.2A11.9 11.9 0 0112 5c6.5 0 10 7 10 7a16.7 16.7 0 01-4.3 5.1M6.1 6.1C3.6 7.7 2 10 2 12c0 0 3.5 7 10 7 1.7 0 3.3-.4 4.7-1.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
            </div>
        </label>
        <div class="auth-row">
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
        </div>
        <button class="btn" type="submit">Login</button>
    </form>
</section>
{% endblock %}
